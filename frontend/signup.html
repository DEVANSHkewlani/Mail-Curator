<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#b02f00" />
  <link rel="manifest" href="/manifest.json" />
  <title>Sign Up — The Curator Mail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f4ef;
      --panel: #ffffff;
      --primary: #b02f00;
      --text: #1b1c19;
      --text-soft: #5b4039;
      --border: #e4e2dd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-image: radial-gradient(circle at 2px 2px, #e4e2dd 1px, transparent 0);
      background-size: 32px 32px;
    }
    .login-card {
      background: var(--panel);
      width: 100%;
      max-width: 400px;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 20px;
      color: var(--primary);
      margin-bottom: 32px;
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    p.subtitle { color: var(--text-soft); font-size: 14px; margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-soft); }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      background: #fcfbf9;
      border-radius: 6px;
      font-family: inherit;
      font-size: 15px;
      transition: all 0.2s;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(176, 47, 0, 0.08);
      background: #fff;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }
    .btn-primary:hover { opacity: 0.9; }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 14px;
      color: var(--text-soft);
    }
    .footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .footer a:hover { text-decoration: underline; }

    #error-msg {
      color: #b02f00;
      background: rgba(176, 47, 0, 0.05);
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1; font-size:32px;">mail</span>
      The Curator Mail
    </div>
    <h1>Create account</h1>
    <p class="subtitle">Join the elite rank of curators and automate your outreach.</p>

    <div id="error-msg"></div>

    <form id="signupForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" required placeholder="name@company.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required minlength="6" placeholder="Choose a secure password" />
      </div>
      <button type="submit" class="btn-primary">Sign Up</button>
    </form>

    <div class="footer">
      Already have an account? <a href="/login.html">Sign in here</a>
    </div>
  </div>

  <script src="app.js?v=5"></script>
  <script>
    document.getElementById('signupForm').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      const errorEl = document.getElementById('error-msg');
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass })
        });

        const data = await res.json().catch(() => ({}));
        if (res.ok) {
          localStorage.setItem('curator_token', data.access_token);
          localStorage.setItem('curator_user_email', email);
          window.location.href = '/compose.html';
        } else {
          errorEl.textContent = data.detail || 'Signup failed. Please try again.';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Connection error. Is the server running?';
        errorEl.style.display = 'block';
      }
    };
  </script>
</body>
</html>
